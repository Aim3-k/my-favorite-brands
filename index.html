<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Brands</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Favorite Brands</h1>
        <p>A collection of brands I use and admire</p>
    </header>

    <main class="brand-grid">
        <!-- Brand 1 -->
        <div class="brand-card">
            <div class="brand-logo">MC</div>
            <h3>Manchester City</h3>
            <p>Football & Lifestyle</p>
        </div>

        <!-- Brand 2 -->
        <div class="brand-card">
            <div class="brand-logo">NV</div>
            <h3>NVIDIA</h3>
            <p>High-Performance Tech</p>
        </div>

        <!-- Brand 3 -->
        <div class="brand-card">
            <div class="brand-logo">RW</div>
            <h3>Made in Rwanda</h3>
            <p>Local Excellence</p>
        </div>

        <!-- Brand 4 -->
        <div class="brand-card">
            <div class="brand-logo">AC</div>
            <h3>Acer</h3>
            <p>Computing Power</p>
        </div>
    </main>

</body>
</html>
